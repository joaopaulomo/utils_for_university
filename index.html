<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grades Horárias — João</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0B1929;
      --bg-card: #132034;
      --bg-card-hover: #1a2d47;
      --surface: #1E3250;
      --amber: #F4A316;
      --amber-dim: #a86e0a;
      --text: #E8F4FD;
      --text-muted: #7fa8cc;
      --text-dim: #4a7099;
      --border: #1f3a5c;
      --border-bright: #2a4f78;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      grid-template-areas:
        "topbar topbar"
        "sidebar main";
      height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      grid-area: topbar;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      background: var(--bg);
      position: relative;
      z-index: 10;
    }

    .topbar-logo {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--amber);
      letter-spacing: 0.02em;
      text-decoration: none;
    }

    .topbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border-bright);
    }

    .topbar-title {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text-muted);
      flex: 1;
    }

    .topbar-coord {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── Sidebar ── */
    .sidebar {
      grid-area: sidebar;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
    }

    .sidebar-section {
      padding: 0 16px;
      margin-bottom: 24px;
    }

    .sidebar-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding: 0 8px;
    }

    .semester-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .semester-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    .semester-btn.active {
      background: var(--surface);
      color: var(--amber);
      border: 1px solid var(--border-bright);
    }

    .semester-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .semester-btn.active .semester-dot {
      background: var(--amber);
    }

    /* ── Main ── */
    .main {
      grid-area: main;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .welcome-glyph {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 600;
      color: var(--border-bright);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .welcome h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .welcome p {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 360px;
    }

    /* Iframe view */
    .grade-view {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .grade-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .grade-header-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .grade-badge {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(244, 163, 22, 0.12);
      color: var(--amber);
      border: 1px solid rgba(244, 163, 22, 0.25);
    }

    .grade-header-spacer { flex: 1; }

    .btn-open {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border-bright);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-open:hover {
      background: var(--surface);
      color: var(--text);
    }

    .grade-frame-wrap {
      flex: 1;
      overflow: hidden;
    }

    .grade-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* Seismic ruler — the signature element */
    .seismic-ruler {
      height: 3px;
      background: repeating-linear-gradient(
        90deg,
        var(--amber) 0px,
        var(--amber) 1px,
        transparent 1px,
        transparent 8px
      );
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* Scrollbar */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    /* Mobile fallback */
    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 56px auto 1fr;
        grid-template-areas:
          "topbar"
          "sidebar"
          "main";
        height: auto;
        min-height: 100vh;
      }
      .sidebar { max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
      .grade-frame-wrap { min-height: 600px; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar-logo">IGEO/UFBA</span>
    <div class="topbar-sep"></div>
    <span class="topbar-title">Grades Horárias</span>
    <span class="topbar-coord">12°58'S 38°30'W</span>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Semestres</div>
      <div id="semester-list">
        <!-- preenchido por JS -->
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="main-area">
    <div class="seismic-ruler"></div>

    <!-- Tela de boas-vindas (padrão) -->
    <div class="welcome" id="welcome">
      <div class="welcome-glyph">
        ∿∿∿<br>∿∿∿
      </div>
      <h2>Selecione um semestre</h2>
      <p>Suas grades horárias ficam guardadas aqui. Adicione novas rodando o script Python e copiando o HTML gerado para a pasta <code>grades/</code>.</p>
    </div>

    <!-- View de grade (oculto inicialmente) -->
    <div class="grade-view" id="grade-view" style="display:none;">
      <div class="grade-header">
        <span class="grade-header-title" id="grade-title">—</span>
        <span class="grade-badge" id="grade-badge">—</span>
        <div class="grade-header-spacer"></div>
        <a class="btn-open" id="grade-open-link" target="_blank">↗ Abrir</a>
      </div>
      <div class="grade-frame-wrap">
        <iframe id="grade-iframe" src="" title="Grade horária"></iframe>
      </div>
    </div>
  </main>

</div>

<script>
  // ────────────────────────────────────────────
  // CONFIGURAÇÃO: adicione aqui seus semestres.
  // Cada objeto: { id: "2025-1", label: "2025.1", arquivo: "grades/grade_visual_2025-1.html" }
  // ────────────────────────────────────────────
  const SEMESTRES = [
    { id: "2026.1", label: "2026.1", arquivo: "grades/grade_visual_2026.1.html" },
    { id: "2026.2", label: "2026.2", arquivo: "grades/grade_visual_2026.2.html" },
  ];

  // ── Render sidebar ──
  const list = document.getElementById('semester-list');

  if (SEMESTRES.length === 0) {
    list.innerHTML = `<p style="padding:8px 12px; font-size:12px; color:var(--text-dim);">Nenhum semestre ainda.<br>Veja o README.</p>`;
  } else {
    SEMESTRES.forEach(sem => {
      const btn = document.createElement('button');
      btn.className = 'semester-btn';
      btn.dataset.id = sem.id;
      btn.innerHTML = `<span class="semester-dot"></span>${sem.label}`;
      btn.addEventListener('click', () => abrirGrade(sem));
      list.appendChild(btn);
    });
  }

  // ── Abrir grade ──
  function abrirGrade(sem) {
    document.querySelectorAll('.semester-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.semester-btn[data-id="${sem.id}"]`);
    if (btn) btn.classList.add('active');

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('grade-view').style.display = 'flex';
    document.getElementById('grade-title').textContent = `Grade ${sem.label}`;
    document.getElementById('grade-badge').textContent = sem.label;
    document.getElementById('grade-open-link').href = sem.arquivo;
    document.getElementById('grade-iframe').src = sem.arquivo;
  }

  // ── URL hash navigation ──
  function loadFromHash() {
    const hash = window.location.hash.replace('#', '');
    if (hash) {
      const sem = SEMESTRES.find(s => s.id === hash);
      if (sem) abrirGrade(sem);
    }
  }

  loadFromHash();
  window.addEventListener('hashchange', loadFromHash);
</script>
</body>
</html>
